<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Research → Zotero · Options</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 480px; padding: 24px; }
      label { display: block; margin: 12px 0 4px; font-size: 13px; }
      input[type=text], input[type=password] { width: 100%; padding: 6px; font-size: 13px; box-sizing: border-box; }
      .row { margin: 12px 0; }
      button { padding: 8px 16px; font-size: 13px; cursor: pointer; }
      .saved { color: green; font-size: 12px; margin-left: 8px; }
    </style>
  </head>
  <body>
    <h1>Research → Zotero</h1>

    <label for="apiKey">Zotero API key (read/write)</label>
    <input id="apiKey" type="password" autocomplete="off" />

    <label for="userId">Zotero user ID (auto-filled after first sync)</label>
    <input id="userId" type="text" autocomplete="off" />

    <div class="row">
      <label><input type="checkbox" id="enableAlphaxiv" /> Enable AlphaXiv sync</label>
      <label><input type="checkbox" id="enableScholarInbox" /> Enable Scholar-Inbox sync</label>
      <label><input type="checkbox" id="attachPdfLink" /> Attach PDF link to per-page-sync items</label>
    </div>

    <div class="row">
      <button id="save">Save</button>
      <span id="status" class="saved"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
